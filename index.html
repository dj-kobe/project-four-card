<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <script src="https://kit.fontawesome.com/fdc6687e46.js" crossorigin="anonymous"></script>
  
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <link rel="stylesheet" href="styles.css">


<section id="result" class="box 1">
   <h3>Your Result</h3>
   <section id="score">
  <h2>76</h2>
  <p>of 100</p>
   </section>

   <p>Great</p>
  <p>You scored higher than 65% of the people who have taken these tests.</p>
  
</section>

<section id="summary" class="box 2">

<p>Summary</p>
   <i class="fa-solid fa-bolt" style="color: rgb(177, 151, 252);"></i>
  Reaction
  80 / 100
   <br>
  <br>


  <i class="fa-solid fa-brain" style="color: rgb(177, 151, 252);"></i>
  Memory
  92 / 100
  <br>
  <br>

<i class="fa-regular fa-message" style="color: rgb(177, 151, 252);"></i>
  Verbal
  61 / 100
  <br> <br>

  <i class="fa-solid fa-eye" style="color: rgb(177, 151, 252);"></i>
  Visual
  72 / 100 <br>
  <br>

<button>Continue</button>

   </section>

   </body>



  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Mojalefa Maarman</a>.
  </footer>
</body>
</html>
